name: Deploy Jennifer Voice Agent to Azure Container Apps

on:
  push:
    branches:
      - main  # Triggers the pipeline on every push to the main branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: ai-receptionist-env
    steps:
      # 1. Pull the fresh code into the GitHub runner
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # 2. Authenticate to Azure using credentials stored in GitHub Secrets
      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # 3. Build the Dockerfile and push it directly to your Azure Container App
      - name: Build and Deploy to Azure Container Apps
        uses: azure/container-apps-deploy-action@v1
        with:
          appSourcePath: ${{ github.workspace }}
          acrName: ${{ secrets.ACR_NAME }}
          containerAppName: ai-receptionist-server
          resourceGroup: AIReceptionistRG
          targetPort: 8000
